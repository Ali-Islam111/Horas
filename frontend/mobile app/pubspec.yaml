name: ai_proctor_mobile
description: AI-powered exam proctoring mobile application with real-time monitoring.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Design
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  
  # Navigation
  go_router: ^12.1.3
  
  # Networking
  http: ^1.1.2
  dio: ^5.4.0
  
  # Camera & Media
  camera: ^0.10.5+5
  image_picker: ^1.0.5
  permission_handler: ^11.1.0
  
  # Audio
  flutter_sound: ^9.2.13
  audioplayers: ^5.2.1
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1
  
  # Utils
  intl: ^0.18.1
  uuid: ^4.2.2
  
  # Charts
  fl_chart: ^0.65.0
  
  # Video Player
  video_player: ^2.8.1
  
  # WebSockets (for real-time updates)
  web_socket_channel: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: fonts/CustomFont-Regular.ttf
